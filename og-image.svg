<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7931a"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Bitcoin Logo -->
  <text x="600" y="200" text-anchor="middle" font-size="120" fill="#f7931a">₿</text>
  
  <!-- Title -->
  <text x="600" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#ffffff">The Bitcoin Price Archive</text>
  
  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#a0a0a0">Daily price data from 2009 to present</text>
  
  <!-- Stats -->
  <text x="600" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#22c55e">5,859+ days of OHLC data • Free API • Updated daily</text>
  
  <!-- Decorative line -->
  <line x1="300" y1="520" x2="900" y2="520" stroke="url(#orange)" stroke-width="3"/>
</svg>